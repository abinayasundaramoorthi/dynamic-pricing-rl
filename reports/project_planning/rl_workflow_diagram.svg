<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect width="800" height="480" fill="#ffffff"/>
  <text x="400" y="35" font-size="20" font-weight="700" text-anchor="middle" fill="#1a1a2e">Reinforcement Learning Workflow</text>
  <rect x="90" y="150" width="200" height="120" rx="14" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2.5"/>
  <text x="190" y="200" font-size="20" font-weight="700" text-anchor="middle" fill="#1c2b6b">AGENT</text>
  <text x="190" y="226" font-size="13" text-anchor="middle" fill="#37426b">(Pricing Engine)</text>
  <text x="190" y="246" font-size="13" text-anchor="middle" fill="#37426b">chooses Action</text>
  <rect x="510" y="150" width="200" height="120" rx="14" fill="#e6f8ef" stroke="#2f9e64" stroke-width="2.5"/>
  <text x="610" y="200" font-size="20" font-weight="700" text-anchor="middle" fill="#1b5e3a">ENVIRONMENT</text>
  <text x="610" y="226" font-size="13" text-anchor="middle" fill="#2f4a3c">(Simulated Market)</text>
  <text x="610" y="246" font-size="13" text-anchor="middle" fill="#2f4a3c">returns State + Reward</text>
  <path d="M 290 190 L 500 190" stroke="#3b5bdb" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="395" y="178" font-size="14" font-weight="600" text-anchor="middle" fill="#1c2b6b">Action (price set)</text>
  <path d="M 510 240 L 300 240" stroke="#2f9e64" stroke-width="2.5" fill="none" marker-end="url(#arrowGreen)"/>
  <text x="400" y="262" font-size="14" font-weight="600" text-anchor="middle" fill="#1b5e3a">New State + Reward (revenue)</text>
  <rect x="230" y="330" width="340" height="70" rx="12" fill="#fff4e0" stroke="#d98c1f" stroke-width="2"/>
  <text x="400" y="358" font-size="14" font-weight="700" text-anchor="middle" fill="#7a4a05">Agent updates its Policy</text>
  <text x="400" y="378" font-size="12" text-anchor="middle" fill="#7a4a05">based on reward received (learning step)</text>
  <path d="M 610 270 C 610 320, 560 330, 570 335" stroke="#d98c1f" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <path d="M 230 350 C 150 350, 150 280, 180 271" stroke="#d98c1f" stroke-width="2" fill="none" marker-end="url(#arrowOrange)"/>
  <text x="400" y="440" font-size="13" text-anchor="middle" fill="#555555">Repeats every day (step) until Episode ends → repeats across many Episodes to improve Policy</text>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#3b5bdb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#2f9e64"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#d98c1f"/>
    </marker>
  </defs>
</svg>
